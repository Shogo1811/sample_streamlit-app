worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # ログ（コンテナ環境: stdout/stderr）
    access_log /dev/stdout;
    error_log /dev/stderr;

    # gzip
    gzip on;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # レート制限
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 8080;
        server_name _;

        # セキュリティヘッダー
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://login.microsoftonline.com https://*.snowflakecomputing.app" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # リクエストサイズ制限
        client_max_body_size 1m;

        # React SPA 静的ファイル
        root /usr/share/nginx/html;
        index index.html;

        # API プロキシ → FastAPI (localhost:8000)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
        }

        # ヘルスチェック
        location /health {
            proxy_pass http://127.0.0.1:8000/health;
        }

        # SPA フォールバック（React Router 対応）
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
