name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ジョブ1: リント・フォーマットチェック
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: pip install ruff
      - name: Ruff format check
        run: ruff format --check .
      - name: Ruff lint check
        run: ruff check .

  # ジョブ2: 単体テスト + カバレッジ
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests with coverage
        run: |
          pytest -m unit \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short -q
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ジョブ3: セキュリティスキャン
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit
      - name: Dependency vulnerability scan
        run: pip-audit --strict --desc on
      - name: Security lint (bandit rules via ruff)
        run: ruff check --select S .

  # ジョブ4: STGデプロイ（develop push → SQL適用 + Streamlitデプロイ）
  deploy-stg:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Snowflake CLI
        run: pip install snowflake-cli==3.4.1
      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/snowflake_key.pem
          chmod 600 /tmp/snowflake_key.pem
          cat > ~/.snowflake/connections.toml <<'TOML'
[default]
account = "${SNOWFLAKE_ACCOUNT}"
user = "${SNOWFLAKE_USER}"
authenticator = "SNOWFLAKE_JWT"
private_key_file = "/tmp/snowflake_key.pem"
database = "RAMEN_LOGISTICS_STG_DB"
schema = "APP"
warehouse = "RAMEN_APP_STG_WH"
TOML
          envsubst < ~/.snowflake/connections.toml > /tmp/conn.toml && mv /tmp/conn.toml ~/.snowflake/connections.toml
      - name: Apply SQL migrations (if changed)
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^sql/'; then
            echo "SQL changes detected — applying setup.sql"
            export ENV=STG AUTO_SUSPEND_SEC=120 TIME_TRAVEL_DAYS=3 CREDIT_QUOTA=10
            envsubst < sql/setup.sql | snow sql -f -
          else
            echo "No SQL changes — skipping"
          fi
      - name: Deploy Streamlit app to STG
        run: snow streamlit deploy --replace
      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/snowflake_key.pem ~/.snowflake/connections.toml

  # ジョブ5: PRODデプロイ（main push → 手動承認 → SQL適用 + Streamlitデプロイ）
  deploy-prod:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      # GitHub Environment Protection Rules で承認者を設定すること
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Snowflake CLI
        run: pip install snowflake-cli==3.4.1
      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/snowflake_key.pem
          chmod 600 /tmp/snowflake_key.pem
          cat > ~/.snowflake/connections.toml <<'TOML'
[default]
account = "${SNOWFLAKE_ACCOUNT}"
user = "${SNOWFLAKE_USER}"
authenticator = "SNOWFLAKE_JWT"
private_key_file = "/tmp/snowflake_key.pem"
database = "RAMEN_LOGISTICS_PROD_DB"
schema = "APP"
warehouse = "RAMEN_APP_PROD_WH"
TOML
          envsubst < ~/.snowflake/connections.toml > /tmp/conn.toml && mv /tmp/conn.toml ~/.snowflake/connections.toml
      - name: Apply SQL migrations (if changed)
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^sql/'; then
            echo "SQL changes detected — applying setup.sql"
            export ENV=PROD AUTO_SUSPEND_SEC=180 TIME_TRAVEL_DAYS=7 CREDIT_QUOTA=50
            envsubst < sql/setup.sql | snow sql -f -
          else
            echo "No SQL changes — skipping"
          fi
      - name: Deploy Streamlit app to PROD
        run: snow streamlit deploy --replace
      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/snowflake_key.pem ~/.snowflake/connections.toml
