name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Backend: Lint + Test
  # ============================================
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - run: ruff format --check src/dal/ src/utils/ backend/
      - run: ruff check src/dal/ src/utils/ backend/

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r backend/requirements.txt pytest pytest-cov
      - name: Run backend tests
        env:
          PYTHONPATH: .
        run: |
          pytest backend/tests/ \
            --cov=backend/app --cov=src/dal --cov=src/utils \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short -q

  # ============================================
  # Frontend: Lint + Build
  # ============================================
  lint-build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  # ============================================
  # Security
  # ============================================
  security:
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r backend/requirements.txt pip-audit
      - run: pip-audit --desc on
      - run: pip install ruff && ruff check --select S src/ backend/app/

  # ============================================
  # Deploy: STG (develop branch)
  # ============================================
  deploy-stg:
    runs-on: ubuntu-latest
    needs: [test-backend, lint-build-frontend, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/snowflake_key.pem
          chmod 600 /tmp/snowflake_key.pem
          printf '[default]\naccount = "%s"\nuser = "%s"\nauthenticator = "SNOWFLAKE_JWT"\nprivate_key_file = "/tmp/snowflake_key.pem"\ndatabase = "RAMEN_LOGISTICS_STG_DB"\nschema = "APP"\nwarehouse = "RAMEN_APP_STG_WH"\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" > ~/.snowflake/connections.toml
          chmod 600 ~/.snowflake/connections.toml

      - name: Apply SQL migrations (if changed)
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^sql/'; then
            echo "SQL changes detected"
            export ENV=STG AUTO_SUSPEND_SEC=120 TIME_TRAVEL_DAYS=3 CREDIT_QUOTA=10
            envsubst < sql/setup.sql | snow sql -f -
          else
            echo "No SQL changes — skipping"
          fi

      - name: Get Image Repository URL
        id: repo
        run: |
          REPO_URL=$(snow sql -q "SHOW IMAGE REPOSITORIES IN SCHEMA APP" --format json \
            | python -c "import sys,json; print(json.load(sys.stdin)[0]['repository_url'])")
          echo "url=$REPO_URL" >> "$GITHUB_OUTPUT"

      - name: Docker build & push
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.pem
          snow registry login
          docker build -t ${{ steps.repo.outputs.url }}/ramen-logistics:${{ github.sha }} \
                       -t ${{ steps.repo.outputs.url }}/ramen-logistics:latest \
                       -f docker/Dockerfile .
          docker push ${{ steps.repo.outputs.url }}/ramen-logistics:${{ github.sha }}
          docker push ${{ steps.repo.outputs.url }}/ramen-logistics:latest

      - name: Deploy Container Service
        run: |
          snow spcs service create-or-replace APP.RAMEN_LOGISTICS_SERVICE \
            --compute-pool RAMEN_APP_STG_POOL \
            --spec-path spec.yml \
            --min-instances 1 --max-instances 1

      - name: Wait for service ready
        run: |
          for i in $(seq 1 30); do
            STATUS=$(snow sql -q "SELECT SYSTEM\$GET_SERVICE_STATUS('APP.RAMEN_LOGISTICS_SERVICE')" --format json \
              | python -c "import sys,json; d=json.loads(json.load(sys.stdin)[0]); print(d[0].get('status',''))" 2>/dev/null || echo "PENDING")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "READY" ]; then exit 0; fi
            sleep 10
          done
          echo "Service did not become READY in time"
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f /tmp/snowflake_key.pem ~/.snowflake/connections.toml

  # ============================================
  # Deploy: PROD (main branch)
  # ============================================
  deploy-prod:
    runs-on: ubuntu-latest
    needs: [test-backend, lint-build-frontend, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/snowflake_key.pem
          chmod 600 /tmp/snowflake_key.pem
          printf '[default]\naccount = "%s"\nuser = "%s"\nauthenticator = "SNOWFLAKE_JWT"\nprivate_key_file = "/tmp/snowflake_key.pem"\ndatabase = "RAMEN_LOGISTICS_PROD_DB"\nschema = "APP"\nwarehouse = "RAMEN_APP_PROD_WH"\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" > ~/.snowflake/connections.toml
          chmod 600 ~/.snowflake/connections.toml

      - name: Apply SQL migrations (if changed)
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^sql/'; then
            echo "SQL changes detected"
            export ENV=PROD AUTO_SUSPEND_SEC=180 TIME_TRAVEL_DAYS=7 CREDIT_QUOTA=50
            envsubst < sql/setup.sql | snow sql -f -
          else
            echo "No SQL changes — skipping"
          fi

      - name: Get Image Repository URL
        id: repo
        run: |
          REPO_URL=$(snow sql -q "SHOW IMAGE REPOSITORIES IN SCHEMA APP" --format json \
            | python -c "import sys,json; print(json.load(sys.stdin)[0]['repository_url'])")
          echo "url=$REPO_URL" >> "$GITHUB_OUTPUT"

      - name: Docker build & push
        run: |
          snow registry login
          docker build -t ${{ steps.repo.outputs.url }}/ramen-logistics:${{ github.sha }} \
                       -t ${{ steps.repo.outputs.url }}/ramen-logistics:latest \
                       -f docker/Dockerfile .
          docker push ${{ steps.repo.outputs.url }}/ramen-logistics:${{ github.sha }}
          docker push ${{ steps.repo.outputs.url }}/ramen-logistics:latest

      - name: Deploy Container Service
        run: |
          snow spcs service create-or-replace APP.RAMEN_LOGISTICS_SERVICE \
            --compute-pool RAMEN_APP_PROD_POOL \
            --spec-path spec.yml \
            --min-instances 1 --max-instances 1

      - name: Wait for service ready
        run: |
          for i in $(seq 1 30); do
            STATUS=$(snow sql -q "SELECT SYSTEM\$GET_SERVICE_STATUS('APP.RAMEN_LOGISTICS_SERVICE')" --format json \
              | python -c "import sys,json; d=json.loads(json.load(sys.stdin)[0]); print(d[0].get('status',''))" 2>/dev/null || echo "PENDING")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "READY" ]; then exit 0; fi
            sleep 10
          done
          echo "Service did not become READY in time"
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f /tmp/snowflake_key.pem ~/.snowflake/connections.toml
