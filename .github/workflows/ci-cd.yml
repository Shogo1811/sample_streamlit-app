name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install ruff
      - run: ruff format --check .
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Run unit tests with coverage
        run: |
          pytest -m unit \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short -q
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]" pip-audit
      - run: pip-audit --strict --desc on --local
      - run: ruff check --select S .

  deploy-stg:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install snowflake-cli==3.4.1
      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/snowflake_key.pem
          chmod 600 /tmp/snowflake_key.pem
          printf '[default]\naccount = "%s"\nuser = "%s"\nauthenticator = "SNOWFLAKE_JWT"\nprivate_key_file = "/tmp/snowflake_key.pem"\ndatabase = "RAMEN_LOGISTICS_STG_DB"\nschema = "APP"\nwarehouse = "RAMEN_APP_STG_WH"\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" > ~/.snowflake/connections.toml
      - name: Apply SQL migrations (if changed)
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^sql/'; then
            echo "SQL changes detected"
            export ENV=STG AUTO_SUSPEND_SEC=120 TIME_TRAVEL_DAYS=3 CREDIT_QUOTA=10
            envsubst < sql/setup.sql | snow sql -f -
          else
            echo "No SQL changes — skipping"
          fi
      - run: snow streamlit deploy --replace
      - name: Cleanup
        if: always()
        run: rm -f /tmp/snowflake_key.pem ~/.snowflake/connections.toml

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install snowflake-cli==3.4.1
      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/snowflake_key.pem
          chmod 600 /tmp/snowflake_key.pem
          printf '[default]\naccount = "%s"\nuser = "%s"\nauthenticator = "SNOWFLAKE_JWT"\nprivate_key_file = "/tmp/snowflake_key.pem"\ndatabase = "RAMEN_LOGISTICS_PROD_DB"\nschema = "APP"\nwarehouse = "RAMEN_APP_PROD_WH"\n' \
            "$SNOWFLAKE_ACCOUNT" "$SNOWFLAKE_USER" > ~/.snowflake/connections.toml
      - name: Apply SQL migrations (if changed)
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^sql/'; then
            echo "SQL changes detected"
            export ENV=PROD AUTO_SUSPEND_SEC=180 TIME_TRAVEL_DAYS=7 CREDIT_QUOTA=50
            envsubst < sql/setup.sql | snow sql -f -
          else
            echo "No SQL changes — skipping"
          fi
      - run: snow streamlit deploy --replace
      - name: Cleanup
        if: always()
        run: rm -f /tmp/snowflake_key.pem ~/.snowflake/connections.toml
