# Snowflake CLI プロジェクト定義（SiSデプロイ用）
# デプロイ: snow streamlit deploy --replace
# Warehouse名はCI/CDのconnections.tomlで環境別に指定される
definition_version: 2

entities:
  ramen_logistics_app:
    type: streamlit
    identifier:
      name: RAMEN_LOGISTICS_APP
      schema: APP
    title: "食材物流管理システム"
    main_file: src/app.py
    pages_dir: src/pages/
    query_warehouse: RAMEN_APP_PROD_WH
    stage: APP.STREAMLIT_STAGE
